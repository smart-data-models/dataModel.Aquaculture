    get:
      description: "Retrieve a set of entities which matches a specific query from an NGSI-LD system"
      parameters:
        -
          in: query
          name: type
          required: true
          schema:
            enum:
              - Sump
            type: string
      responses:
        ? "200"
        :
          content:
            application/ld+json:
              examples:
                keyvalues:
                  summary: "Key-Values Pairs"
                  value:
                    -
                      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Sump/examples/example.json"
                normalized:
                  summary: "Normalized NGSI-LD"
                  value:
                    -
                      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Sump/examples/example-normalized.jsonld"
          description: OK
      tags:
        - ngsi-ld
tags:
