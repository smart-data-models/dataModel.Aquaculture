    Sump: 
      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Sump/model.yaml#/Sump"
info:
  description:  |
    Sump entity represents a water treatment and recirculation unit in an aquaculture facility, monitoring water quality parameters such as pH, CO2, redox potential, and gas pressure to ensure optimal conditions for fish containment.
  title: Sump
  version: "0.0.1"
openapi: "3.0.0"

paths:
