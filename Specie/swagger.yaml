components:
  schemas: 
    Specie: 
      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Specie/model.yaml#/Specie"
info:
  description:  |
    Specie entity describes scientific and physiological parameters of an aquaculture fish species, including digestion, feeding capacity, and biological growth-related properties used for simulation and monitoring
  title: Specie
  version: "0.0.1"
openapi: "3.0.0"

paths:
  /ngsi-ld/v1/entities:
    get:
      description: "Retrieve a set of entities which matches a specific query from an NGSI-LD system"
      parameters:
        -
          in: query
          name: type
          required: true
          schema:
            enum:
              - Specie
            type: string
      responses:
        ? "200"
        :
          content:
            application/ld+json:
              examples:
                keyvalues:
                  summary: "Key-Values Pairs"
                  value:
                    -
                      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Specie/examples/example.json"
                normalized:
                  summary: "Normalized NGSI-LD"
                  value:
                    -
                      $ref: "https://smart-data-models.github.io/dataModel.Aquaculture/Specie/examples/example-normalized.jsonld"
          description: OK
      tags:
        - ngsi-ld
tags:
  -
    description: "NGSI-LD Linked-data Format"
    name: ngsi-ld
